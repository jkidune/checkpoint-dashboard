name: Checkpoint CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js 18.x
      uses: actions/setup-node@v4
      with:
        node-version: 18.x
        # We leave 'cache' empty for now to avoid the error you saw
        cache: '' 

    - name: Install All Dependencies
      # This runs the 'npm run install:all' command from your README
      run: npm run install:all

    - name: Build Frontend
      run: |
        cd frontend
        npm run build

    - name: Check Backend
      run: |
        cd backend
        node --check server.js